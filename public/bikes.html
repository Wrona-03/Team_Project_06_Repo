<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bicycle Checker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="burger">&#9776;</button>
      <ul class="nav-list">
        <li><a href="/">Home</a></li>
        <li><a href="/trainTime.html">Live Departures</a></li>
        <li><a href="/bikes.html">Bicycle Checker</a></li>
        <li><a href="fare_calculator.html">Fare Calculator</a></li>
      </ul>
    </nav>

    <div class="train-con">
      <h2 class="train-title">Bicycle Checker</h2>

      <div class="station-select">
        <div class="autocomplete">
          <input id="stopsInput" type="text" placeholder="Search Zone 1 stop..." autocomplete="off" />
        </div>
        <button id="bikes-btn">Nearby Bikes</button>
        <button id="all-bikes-btn">All Bikes</button>
      </div>
      <div class="station-select">
        
  <div class="autocomplete">
    <input id="bike-station-input" type="text" placeholder="Search a bike station..." autocomplete="off" />
  </div>
  <button id="bike-station-btn">Search Bike Station</button>
  <button id="fav-station-btn">Save Station</button>
</div>
<div id="fav-station-div" style="display:none"></div>
      <p class="error-message" id="error-msg"></p>

      <div class="table-con">
        <table id="bikes-table" class="results-con">
          <thead>
            <tr>
              <th>Name</th>
              <th>Available Bikes</th>
              <th>Available Stands</th>
              <th>Distance</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <script src="bikes.js" defer></script>
    <script src="navbar.js" defer></script>
  </body>
</html>
