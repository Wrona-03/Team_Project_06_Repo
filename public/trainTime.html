<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Train Departures</title>
    <link rel="stylesheet" href="./stylesheets/styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <button class="burger">&#9776;</button>
      <ul class="nav-list">
        <li><a href="/">Home</a></li>
        <li><a href="/trainTime.html">Live Departures</a></li>
        <li><a href="/bikes.html">Bicycle Checker</a></li>
        <li><a href="/fare_calculator.html">Fare Calculator</a></li>
      </ul>
    </nav>
    <div class="table-stops-wrapper">
      <div class="train-con">
        <h2 class="train-title">Live Departures</h2>
        <p class="user_guide">Search for a station to see upcoming departures and expected train times. Click 'View Stops' on any train to see its route.</p>
        <div class="station-select">
          <div class="autocomplete">
            <input id="stationInput" type="text" placeholder="Search station..." autocomplete="off" />
          </div>
          <button id="searchBtn">Search</button>
          <button id="fav-btn">Save Station</button>
        </div>
        <div id="fav-div" style="display:none"></div>
        <p class="error-message" id="errorMsg"></p>

        <div class="table-con">
          <table id="resultsCon" class="results-con">
            <thead>
              <tr>
                <th>Station</th>
                <th>Destination</th>
                <th>Scheduled</th>
                <th>Expected</th>
                <th>Due (min)</th>
                <th>Last Location</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="stops-container">
        <h3 id="stops-title"></h3>
        <ul id="stops-list"></ul>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="trainStops.js"></script>
    <script src="navbar.js"></script>
  </body>
</html>
